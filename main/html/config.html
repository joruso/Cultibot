<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuración de Red</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f0f2f5;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #333;
            color: white;
            position: fixed;
            left: -250px;
            transition: left 0.3s;
            z-index: 1000;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar h2 {
            text-align: center;
            padding: 1em 0;
            background-color: #444;
            margin: 0;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li button {
            padding: 15px;
            text-align: center;
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
            background-color: #333;
            transition: 0.3s;
        }

        .sidebar ul li button:hover {
            background-color: #555;
        }

        .content {
            margin-left: 0px;
            padding: 20px;
            width: 100%;
            transition: margin-left 0.3s;
            box-sizing: border-box;
        }

        .content h1 {
            color: #333;
            margin-left: 60px;
        }

        .data-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
            flex: 1;
            min-width: 250px;
        }

        .card h2 {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .password-row {
            display: flex;
            gap: 5px;
        }

        .password-row button {
            padding: 10px;
            background: #eee;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background-color: #222;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover {
            background-color: #444;
        }

        #menuToggle {
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            z-index: 1001;
        }

        #status_msg {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <ul>
            <li><button id="dash_btn">Inicio</button></li>
            <li><button id="clime_btn">Clima</button></li>
            <li><button id="riego_btn">Riego</button></li>
            <li><button>Configuración</button></li>
        </ul>
    </div>

    <div class="content" id="content">
        <button id="menuToggle">☰</button>
        <h1>Configuración de Conectividad</h1>

        <div class="data-container">
            <div class="card">
                <h2>Red WiFi (Estación)</h2>
                <div class="input-group">
                    <label>Nombre de Red (SSID)</label>
                    <input type="text" id="wifi_ssid" placeholder="Nombre de tu WiFi">
                </div>
                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="password-row">
                        <input type="password" id="wifi_pass" placeholder="••••••••">
                        <button type="button" onclick="togglePass()">👁️</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Servidor MQTT (Telemetría)</h2>
                <div class="input-group">
                    <label>Broker URI (Servidor)</label>
                    <input type="text" id="mqtt_server" placeholder="mqtt://broker.hivemq.com">
                </div>
                <div class="input-group">
                    <label>Tópico de Publicación</label>
                    <input type="text" id="mqtt_topic" placeholder="cultibot/sensor/data">
                </div>
                <p style="color: #888; font-size: 0.8em;">* Estos parámetros permiten que la aplicación Android reciba
                    las alertas y el estado del cultivo de forma remota.</p>
            </div>
        </div>

        <div style="max-width: 400px; margin: 30px auto;">
            <button class="btn-save" onclick="saveConnectivity()">Guardar Cambios de Red</button>
            <div id="status_msg"></div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");
        const menuToggle = document.getElementById("menuToggle");

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
        });

        document.getElementById('dash_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/`; }, 30);

        };
        document.getElementById('clime_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/clima`; }, 30);

        };
        document.getElementById('riego_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/riego`; }, 30);

        };


        function togglePass() {
            const p = document.getElementById("wifi_pass");
            p.type = p.type === "password" ? "text" : "password";
        }

        async function loadConfig() {
            try {
                const response = await fetch(`${window.location.origin}/config_get`);
                const data = await response.json();

                document.getElementById('wifi_ssid').value = data.wifi_ssid || "";
                document.getElementById('mqtt_server').value = data.mqtt_server || "";
                document.getElementById('mqtt_topic').value = data.mqtt_topic || "";
                
            } catch (e) { console.error("Error cargando configuración:", e); }
        }

        async function saveConnectivity() {
            const msg = document.getElementById("status_msg");
            msg.textContent = "Actualizando credenciales...";
            msg.style.color = "#333";

            const payload = {
                wifi_ssid: document.getElementById('wifi_ssid').value,
                wifi_pass: document.getElementById('wifi_pass').value,
                mqtt_server: document.getElementById('mqtt_server').value,
                mqtt_topic: document.getElementById('mqtt_topic').value
            };

            try {
                const response = await fetch(`${window.location.origin}/config_post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(filteredPayload)
                });

                if (response.ok) {
                    msg.textContent = "✓ Configuración guardada. El sistema se reconectará.";
                    msg.style.color = "#28a745";
                } else {
                    msg.textContent = "✗ Error al guardar parámetros";
                    msg.style.color = "#dc3545";
                }
            } catch (e) {
                msg.textContent = "✗ Error de conexión con el controlador";
                msg.style.color = "#dc3545";
            }
        }

        window.onload = loadConfig;
    </script>
</body>

</html>
