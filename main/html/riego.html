<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riego</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f0f2f5;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #333;
            color: white;
            position: fixed;
            left: -250px;
            transition: left 0.3s;
            z-index: 1000;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar h2 {
            text-align: center;
            padding: 1em 0;
            background-color: #444;
            margin: 0;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li button {
            padding: 15px;
            text-align: center;
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
            background-color: #333;
            transition: 0.3s;
        }

        .sidebar ul li button:hover {
            background-color: #555;
        }

        .content {
            margin-left: 0px;
            padding: 20px;
            width: 100%;
            transition: margin-left 0.3s;
            box-sizing: border-box;
        }

        .content h1 {
            color: #333;
            margin-left: 60px;
        }

        .data-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
            flex: 1;
            min-width: 250px;
        }

        .card h2 {
            font-size: 1.1em;
            margin-bottom: 20px;
            color: #444;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
            font-size: 0.9em;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }

        .btn-save {
            background-color: #28a745;
        }

        .btn-save:hover {
            background-color: #218838;
        }

        .btn-test {
            background-color: #007bff;
        }

        .btn-test:hover {
            background-color: #0069d9;
        }

        .btn-irrigate {
            background-color: #dc3545;
            height: 60px;
            font-size: 1.2em;
        }

        .btn-irrigate:hover {
            background-color: #c82333;
        }

        #menuToggle {
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            z-index: 1001;
        }

        #status_msg {
            margin-top: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <ul>
            <li><button id="dash_btn">Inicio</button></li>
            <li><button id="clime_btn">Clima</button></li>
            <li><button>Riego</button></li>
            <li><button id="config_btn">Configuración</button></li>
        </ul>
    </div>

    <div class="content" id="content">
        <button id="menuToggle">☰</button>
        <h1>Gestión de Riego</h1>

        <div class="data-container">
            <div class="card">
                <h2>Programación de Ciclos</h2>
                <div class="input-group">
                    <label>Frecuencia (Horas entre riegos)</label>
                    <input type="number" id="hours_btw_irri" min="1" max="96">
                </div>
                <div class="input-group">
                    <label>Volumen Principal (Litros)</label>
                    <input type="number" id="litres_water" step="0.1" min="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 1 (ml/L)</label>
                    <input type="number" id="additive_1_ml" min="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 2 (ml/L)</label>
                    <input type="number" id="additive_2_ml" min="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 3 (ml/L)</label>
                    <input type="number" id="additive_3_ml" min="0">
                </div>
                <div id="status_msg_1"></div>
                <button class="btn-action btn-save" onclick="saveProgram()">Guardar Programación</button>
            </div>

            <div class="card">
                <h2>Calibración y Pruebas</h2>
                <p style="color: #888; font-size: 0.8em; margin-bottom: 15px;">Configure los valores medidos tras el
                    test.</p>
                <div class="input-group">
                    <label>Segundos de Test</label>
                    <input type="number" id="test_seconds" value="10" min="1" max="60">
                </div>
                <button class="btn-action btn-test" onclick="runTest()">Ejecutar Test Sistema</button>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                <div class="input-group">
                    <label>Litros medidos</label>
                    <input type="number" id="cal_litres_water" step="0.1" min="0" value="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 1 (ml/L)</label>
                    <input type="number" id="cal_additive_1_ml" min="0" value="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 2 (ml/L)</label>
                    <input type="number" id="cal_additive_2_ml" min="0" value="0">
                </div>
                <div class="input-group">
                    <label>Aditivo 3 (ml/L)</label>
                    <input type="number" id="cal_additive_3_ml" min="0" value="0">
                </div>
                <button class="btn-action btn-save" style="background-color: #6c757d;"
                    onclick="sendCalibration()">Confirmar y Enviar Calibración</button>
            </div>

            <div class="card"
                style="display: flex; flex-direction: column; justify-content: center; align-items: center;">
                <h2>Acción Inmediata</h2>
                <p style="text-align: center; color: #666; margin-bottom: 20px;">Fuerza el inicio de un ciclo de riego
                    completo con los parámetros actuales.</p>
                <button class="btn-action btn-irrigate" onclick="irrigateNow()">REGAR AHORA</button>
                <div id="status_msg"></div>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");
        const menuToggle = document.getElementById("menuToggle");

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
        });
        document.getElementById('dash_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/`; }, 30);

        };
        document.getElementById('clime_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/clima`; }, 30);

        };
        document.getElementById('config_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/config`; }, 30);
        };

        async function loadConfig() {
            try {
                const response = await fetch(`${window.location.origin}/riego_get`);
                const data = await response.json();
                document.getElementById('hours_btw_irri').value = data.hours_btw_irri;
                document.getElementById('litres_water').value = data.litres_water;
                document.getElementById('additive_1_ml').value = data.additive_1_ml;
                document.getElementById('additive_2_ml').value = data.additive_2_ml;
                document.getElementById('additive_3_ml').value = data.additive_3_ml;
            } catch (e) { console.error("Error cargando configuración:", e); }
        }

        async function saveProgram() {
            const msg = document.getElementById("status_msg_1");
            msg.textContent = "Guardando programación...";
            const payload = {
                hours_btw_irri: parseInt(document.getElementById('hours_btw_irri').value),
                litres_water: parseFloat(document.getElementById('litres_water').value),
                additive_1_ml: parseInt(document.getElementById('additive_1_ml').value),
                additive_2_ml: parseInt(document.getElementById('additive_2_ml').value),
                additive_3_ml: parseInt(document.getElementById('additive_3_ml').value)
            };
            try {
                const response = await fetch(`${window.location.origin}/riego_post`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msg.textContent = "✓ Parámetros climáticos actualizados";
                    msg.style.color = "#28a745";
                } else {
                    msg.textContent = "✗ Error en la comunicación";
                    msg.style.color = "#dc3545";
                }
            } catch (e) {
                msg.textContent = "✗ Sin conexión con el ESP32";
                msg.style.color = "#dc3545";
            }
        }

        async function sendCalibration() {

            if (document.getElementById("cal_litres_water").value !== "" ||
                document.getElementById("cal_additive_1_ml").value !== "" ||
                document.getElementById("cal_additive_2_ml").value !== "" ||
                document.getElementById("cal_additive_3_ml").value !== "") {
                configData["comando"] = 4;
                configData["litres_water"] = parseFloat(document.getElementById("cal_litres_water").value);
                configData["additive_1_ml"] = parseFloat(document.getElementById("cal_additive_1_ml").value);
                configData["additive_2_ml"] = parseFloat(document.getElementById("cal_additive_2_ml").value);
                configData["additive_3_ml"] = parseFloat(document.getElementById("cal_additive_3_ml").value);
                irrigate_comand();
            } else {
                alert('Introduce valores');
            }
        }

        async function runTest() {
            if (document.getElementById("test_seconds").value !== "") {
                configData["comando"] = 3;
                configData["test_seconds"] = parseFloat(document.getElementById("test_seconds").value);
                irrigate_comand();

            } else {
                alert('Introduce valores');
            }
        }

        async function irrigateNow() {
            configData["comando"] = 5;      // Se le asigna este valor ver archivo protocolWater.h
            irrigate_comand();
        }

        async function irrigate_comand() {
            try {
                const response = await fetch('/riego_post', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(configData),
                });

                if (response.ok) {
                    alert('Comando enviado correctamente');
                    console.log(JSON.stringify(configData));
                    //window.history.back();
                } else {
                    alert(`Error al procesarlo: ${response.statusText}`);
                }
            } catch (error) {
                console.error('Error al enviar el comando:', error);
                alert('Ocurrió un error al enviar la configuración.');
            }
            configData = {};
        }



        window.onload = loadConfig;
    </script>
</body>

</html>
