<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #f0f2f5;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #333;
            color: white;
            position: fixed;
            left: -250px;
            transition: left 0.3s;
            z-index: 1000;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar h2 {
            text-align: center;
            padding: 1em 0;
            background-color: #444;
            margin: 0;
        }

        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }

        .sidebar ul li button {
            padding: 15px;
            text-align: center;
            border: none;
            color: white;
            width: 100%;
            cursor: pointer;
            background-color: #333;
            transition: 0.3s;
        }

        .sidebar ul li button:hover {
            background-color: #555;
        }

        .content {
            margin-left: 0px;
            padding: 20px;
            width: 100%;
            transition: margin-left 0.3s;
            box-sizing: border-box;
        }

        .content h1 {
            color: #333;
            margin-left: 60px;
        }

        .data-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .card h2 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .card p {
            font-size: 1.8em;
            font-weight: bold;
            margin: 0;
            color: #333;
        }

        .chart-card {
            flex: 3;
            min-width: 350px;
            text-align: left;
        }

        #menuToggle {
            font-size: 24px;
            cursor: pointer;
            padding: 10px;
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            z-index: 1001;
        }
    </style>
</head>

<body>
    <div class="sidebar" id="sidebar">
        <h2>Menú</h2>
        <ul>
            <li><button>Inicio</button></li>
            <li><button id="clima_btn">Clima</button></li>
            <li><button id="riego_btn">Riego</button></li>
            <li><button id="config_btn">Configuración</button></li>
        </ul>
    </div>

    <div class="content" id="content">
        <button id="menuToggle">☰</button>
        <h1>Estado General</h1>

        <div class="data-container">
            <div class="card">
                <h2>Temperatura</h2>
                <p><span id="temperature">--</span>°C</p>
            </div>

            <div class="card">
                <h2>Humedad</h2>
                <p><span id="humidity">--</span>%</p>
            </div>

            <div class="card">
                <h2>Último Riego</h2>
                <p style="font-size: 1.2em;" id="last_irrigation">--/-- --:--</p>
            </div>

            <div class="card chart-card">
                <h2>Historial de Temperatura (24h - Intervalos 30min)</h2>
                <canvas id="tempChart" height="120"></canvas>
            </div>
        </div>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");
        const menuToggle = document.getElementById("menuToggle");

        menuToggle.addEventListener("click", () => {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
        });

        document.getElementById('clima_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/clima`; }, 30);
        };

        document.getElementById('config_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/config`; }, 30);
        };

        document.getElementById('riego_btn').onclick = function () {
            sidebar.classList.toggle("open");
            content.style.marginLeft = sidebar.classList.contains("open") ? "250px" : "0";
            setTimeout(() => { window.location.href = `${window.location.origin}/riego`; }, 30);

        };

        // Configuración inicial del Gráfico
        const ctx = document.getElementById('tempChart').getContext('2d');
        const tempChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array.from({ length: 48 }, (_, i) => `${Math.floor(i / 2)}:${i % 2 === 0 ? '00' : '30'}`),
                datasets: [{
                    label: 'Temperatura (°C)',
                    data: [],
                    borderColor: '#28a745',
                    backgroundColor: 'rgba(40, 167, 69, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: false } } }
        });

        async function updateDashboard() {
            try {
                // 1. Obtener Temp y Humedad actual
                const infoResp = await fetch(`${window.location.origin}/info_json`);
                const infoData = await infoResp.json();
                document.getElementById("temperature").textContent = infoData.temperature.toFixed(1);
                document.getElementById("humidity").textContent = infoData.rel_humidity.toFixed(1);

                // 2. Obtener Fecha del último riego desde la configuración
                const configResp = await fetch(`${window.location.origin}/config_json`);
                const configData = await configResp.json();
                // Formato: DD/MM HH:MM usando las claves de NVS
                const last = `${configData.last_irri_day}/${configData.last_irri_month} ${configData.last_irri_hour}:${configData.last_irri_min.toString().padStart(2, '0')}`;
                document.getElementById("last_irrigation").textContent = last;

                // 3. Obtener Historial (asumiendo endpoint /temp_history)
                const histResp = await fetch(`${window.location.origin}/temp_history`);
                const histData = await histResp.json();
                tempChart.data.datasets[0].data = histData.history;
                tempChart.update();

            } catch (e) { console.error("Error actualizando Dashboard:", e); }
        }

        // Actualización cada 30 segundos
        setInterval(updateDashboard, 30000);
        window.onload = updateDashboard;
    </script>
</body>

</html>
